<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubScout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 200px;
      background: #0d0d0f;
      color: #e8e8ed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      width: 30px; height: 30px;
      background: #7c3aed;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .header-title { font-weight: 600; font-size: 15px; }
    .header-sub { font-size: 11px; color: #636366; margin-top: 1px; }

    /* ── Views ── */
    .view { display: none; padding: 16px; }
    .view.active { display: block; }

    /* ── Login ── */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: #aeaeb2; margin-bottom: 5px; }
    .field input {
      width: 100%;
      padding: 9px 12px;
      background: #1a1a1f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e8e8ed;
      font-size: 13px;
      outline: none;
    }
    .field input:focus { border-color: rgba(139,92,246,0.5); }

    .btn {
      width: 100%;
      padding: 10px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover { background: #6d28d9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #aeaeb2;
      margin-top: 8px;
    }
    .btn.secondary:hover { background: rgba(255,255,255,0.05); color: white; }
    .btn.danger {
      background: rgba(244,63,94,0.1);
      color: #fb7185;
      border: 1px solid rgba(244,63,94,0.2);
      margin-top: 8px;
    }

    .error-msg {
      font-size: 12px;
      color: #fb7185;
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.2);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 12px;
    }

    /* ── Dashboard view ── */
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      margin-bottom: 14px;
    }
    .avatar {
      width: 32px; height: 32px;
      background: rgba(139,92,246,0.2);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #a78bfa;
    }
    .user-email { font-size: 12px; color: #636366; }
    .user-name  { font-size: 13px; font-weight: 500; }

    /* ── Match card ── */
    .match-card {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .match-card .label {
      font-size: 11px;
      color: #34d399;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .match-card .name { font-size: 15px; font-weight: 600; color: white; }
    .match-card .detail { font-size: 11px; color: #636366; margin-top: 2px; }

    .no-match {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #636366;
    }

    .open-link {
      font-size: 12px;
      color: #a78bfa;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 4px;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .open-link:hover { background: rgba(139,92,246,0.1); }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header (always visible) -->
  <div class="header">
    <div class="logo">📡</div>
    <div>
      <div class="header-title">SubScout</div>
      <div class="header-sub" id="header-sub">Gestor de suscripciones</div>
    </div>
  </div>

  <!-- Login view -->
  <div class="view active" id="view-login">
    <div style="margin-bottom:16px; margin-top:4px;">
      <p style="font-size:13px; color:#636366;">Inicia sesión para activar el tracking automático de uso.</p>
    </div>
    <div id="login-error" class="error-msg" style="display:none;"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="input-email" placeholder="tu@email.com" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="input-password" placeholder="••••••••" />
    </div>
    <button class="btn" id="btn-login">Iniciar sesión</button>
  </div>

  <!-- Dashboard view -->
  <div class="view" id="view-dashboard">
    <div class="user-info">
      <div class="avatar" id="user-avatar">?</div>
      <div>
        <div class="user-name" id="user-name">–</div>
        <div class="user-email" id="user-email">–</div>
      </div>
    </div>

    <div id="match-container">
      <!-- Filled by JS -->
    </div>

    <a href="#" class="open-link" id="open-app">Abrir SubScout →</a>
    <button class="btn danger" id="btn-logout">Cerrar sesión</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
